<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Weather App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <div class="weather-card">

        <h1>🌤 Weather App</h1>

        <p class="app-tagline">Weather, local time, and a view from anywhere.</p>

        <div class="search-box">
            <div class="search-field">
                <input type="text" id="cityInput" placeholder="Enter a city, country, or place" autocomplete="off" aria-autocomplete="list" aria-controls="suggestions">
                <div class="suggestions" id="suggestions" role="listbox" hidden></div>
            </div>
            <button onclick="getWeather()"><span>Search</span><span aria-hidden="true">→</span></button>
        </div>

        <div class="loader" id="loader"></div>
<!----> <!----><!----><!---->
        <div class="weather-info" id="weatherInfo">
            <img id="icon">
            <h2 id="city"></h2>
            <h1 id="temp"></h1>
            <p id="desc"></p>
        <!---->
            <div class="details">
                <div>
                    <h3>💧 Humidity</h3>
                    <p id="humidity"></p>
                </div>

                <div>
                    <h3>🌬 Wind</h3>
                    <p id="wind"></p>
                </div>
            </div>

            <div class="time-details" id="timeDetails" aria-live="polite">
                <div>
                    <h3 id="localTimeLabel">Local time</h3>
                    <p id="localTime"></p>
                </div>
                <div id="indiaTimeBlock">
                    <h3>India time</h3>
                    <p id="indiaTime"></p>
                </div>
            </div>
        </div>

        <p id="error"></p>

    </div>
</div>

<script src="script.js"></script>

</body>
</html>
